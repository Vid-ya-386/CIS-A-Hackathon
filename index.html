<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Website Change Detector</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #667eea, #ff9a9e);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Card */
.container {
    background: white;
    padding: 45px;
    border-radius: 20px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.25);
    text-align: center;
    width: 380px;
    animation: fadeIn 0.8s ease-in-out;
    transition: 0.3s;
}

.container:hover {
    transform: translateY(-5px);
}

/* Title */
h1 {
    margin-bottom: 8px;
    color: #444;
    font-weight: 600;
}

.subtitle {
    font-size: 14px;
    color: #777;
    margin-bottom: 25px;
}

/* Input */
input {
    width: 100%;
    padding: 13px;
    border-radius: 12px;
    border: 1px solid #ddd;
    margin-bottom: 15px;
    font-size: 14px;
    transition: 0.2s;
}

input:focus {
    border-color: #ff7eb3;
    outline: none;
    box-shadow: 0 0 5px rgba(255,126,179,0.4);
}

/* Button */
button {
    width: 100%;
    padding: 13px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(135deg, #ff758c, #ff7eb3);
    color: white;
    font-size: 15px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.04);
    box-shadow: 0 8px 20px rgba(255,118,150,0.5);
}

/* Result */
#result {
    margin-top: 20px;
    font-weight: 500;
    opacity: 0;
    transition: 0.4s;
}

.success {
    color: #2ecc71;
}

.error {
    color: #e74c3c;
}

/* Spinner */
.loading {
    border: 4px solid #f3f3f3;
    border-top: 4px solid #ff758c;
    border-radius: 50%;
    width: 26px;
    height: 26px;
    animation: spin 1s linear infinite;
    margin: 15px auto;
}

/* Time */
#time {
    font-size: 12px;
    color: #777;
}

/* Footer */
.footer {
    margin-top: 20px;
    font-size: 12px;
    color: #aaa;
}

/* Animations */
@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}
</style>
</head>

<body>

<div class="container">
    <h1>🔍 Change Detector</h1>
    <p class="subtitle">Track website updates in real-time 💕</p>

    <input type="text" id="url" placeholder="Enter website URL">

    <button onclick="check()">Check Changes</button>

    <div id="loader"></div>
    <p id="result"></p>
    <p id="time"></p>

    <div class="footer">
        Built with 💖 for Hackathon
    </div>
</div>

<script>
function check() {
    let url = document.getElementById("url").value;
    let result = document.getElementById("result");
    let loader = document.getElementById("loader");
    let time = document.getElementById("time");

    if (url === "") {
        result.innerText = "⚠️ Please enter a URL";
        result.className = "error";
        result.style.opacity = 1;
        return;
    }

    loader.innerHTML = '<div class="loading"></div>';
    result.style.opacity = 0;
    time.innerText = "";

    setTimeout(() => {
        loader.innerHTML = "";

        let changed = Math.random() > 0.5;

        if (changed) {
            result.innerText = "⚠️ Website content changed!";
            result.className = "error";
        } else {
            result.innerText = "✅ No significant changes detected";
            result.className = "success";
        }

        result.style.opacity = 1;

        let now = new Date();
        time.innerText = "Last checked: " + now.toLocaleTimeString();

    }, 2000);
}
</script>

</body>
</html>
