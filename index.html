<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Website Change Detector 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Glass card */
.container {
    background: rgba(255, 255, 255, 0.2);
    backdrop-filter: blur(12px);
    padding: 40px;
    border-radius: 20px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    text-align: center;
    width: 360px;
    color: #333;
    animation: fadeIn 0.8s ease-in-out;
}

h1 {
    margin-bottom: 5px;
}

.subtitle {
    font-size: 14px;
    margin-bottom: 25px;
    color: #555;
}

input {
    width: 100%;
    padding: 12px;
    border-radius: 12px;
    border: none;
    margin-bottom: 15px;
    font-size: 14px;
    outline: none;
}

/* Glow button */
button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 12px;
    background: #ff6f91;
    color: white;
    font-size: 15px;
    cursor: pointer;
    transition: 0.3s;
    box-shadow: 0 0 10px #ff6f91;
}

button:hover {
    transform: scale(1.05);
    box-shadow: 0 0 20px #ff6f91;
}

/* Result styles */
#result {
    margin-top: 20px;
    font-weight: 500;
    opacity: 0;
    transition: 0.4s;
}

.success {
    color: #2ecc71;
}

.error {
    color: #e74c3c;
}

/* Spinner */
.loading {
    border: 4px solid #f3f3f3;
    border-top: 4px solid #ff6f91;
    border-radius: 50%;
    width: 25px;
    height: 25px;
    animation: spin 1s linear infinite;
    margin: 15px auto;
}

.footer {
    margin-top: 20px;
    font-size: 12px;
    color: #777;
}

@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}
</style>
</head>

<body>

<div class="container">
    <h1>💖 Change Detector</h1>
    <p class="subtitle">Smart website monitoring</p>

    <input type="text" id="url" placeholder="Enter website URL">

    <button onclick="check()">Check Changes</button>

    <div id="loader"></div>
    <p id="result"></p>
    <p id="time" style="font-size:12px;"></p>

    <div class="footer">
        Built with 💕 for Hackathon
    </div>
</div>

<script>
function check() {
    let url = document.getElementById("url").value;
    let result = document.getElementById("result");
    let loader = document.getElementById("loader");
    let time = document.getElementById("time");

    if (url === "") {
        result.innerText = "⚠️ Enter a URL!";
        result.className = "error";
        result.style.opacity = 1;
        return;
    }

    loader.innerHTML = '<div class="loading"></div>';
    result.style.opacity = 0;
    time.innerText = "";

    setTimeout(() => {
        loader.innerHTML = "";

        let changed = Math.random() > 0.5;

        if (changed) {
            result.innerText = "⚠️ Website changed!";
            result.className = "error";
        } else {
            result.innerText = "✅ No changes detected!";
            result.className = "success";
        }

        result.style.opacity = 1;

        let now = new Date();
        time.innerText = "Last checked: " + now.toLocaleTimeString();

    }, 2000);
}
</script>

</body>
</html>
