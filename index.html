<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Website Change Detector</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #667eea, #764ba2);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.container {
    background: white;
    padding: 40px;
    border-radius: 18px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.2);
    text-align: center;
    width: 360px;
    animation: fadeIn 0.8s ease-in-out;
}

h1 {
    margin-bottom: 5px;
}

.subtitle {
    font-size: 14px;
    color: #777;
    margin-bottom: 25px;
}

input {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid #ccc;
    margin-bottom: 15px;
    font-size: 14px;
}

button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: #667eea;
    color: white;
    font-size: 15px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #5a67d8;
    transform: scale(1.03);
}

#result {
    margin-top: 20px;
    font-weight: 500;
    opacity: 0;
    transition: 0.4s;
}

.success {
    color: green;
}

.error {
    color: red;
}

.loading {
    border: 4px solid #f3f3f3;
    border-top: 4px solid #667eea;
    border-radius: 50%;
    width: 25px;
    height: 25px;
    animation: spin 1s linear infinite;
    margin: 15px auto;
}

.footer {
    margin-top: 20px;
    font-size: 12px;
    color: #aaa;
}

@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}
</style>
</head>

<body>

<div class="container">
    <h1>🔍 Change Detector</h1>
    <p class="subtitle">Smart monitoring for website updates</p>

    <input type="text" id="url" placeholder="Enter website URL">

    <button onclick="check()">Check for Changes</button>

    <div id="loader"></div>
    <p id="result"></p>
    <p id="time" style="font-size:12px; color:#777;"></p>

    <div class="footer">
        Intelligent Web Monitoring System 🚀
    </div>
</div>

<script>
function check() {
    let url = document.getElementById("url").value;
    let result = document.getElementById("result");
    let loader = document.getElementById("loader");
    let time = document.getElementById("time");

    if (url === "") {
        result.innerText = "⚠️ Please enter a URL";
        result.className = "error";
        result.style.opacity = 1;
        return;
    }

    // Show loader
    loader.innerHTML = '<div class="loading"></div>';
    result.style.opacity = 0;
    time.innerText = "";

    setTimeout(() => {
        loader.innerHTML = "";

        // Demo random result (simulate intelligence)
        let changed = Math.random() > 0.5;

        if (changed) {
            result.innerText = "⚠️ Website content changed!";
            result.className = "error";
        } else {
            result.innerText = "✅ No significant changes detected";
            result.className = "success";
        }

        result.style.opacity = 1;

        // Show time
        let now = new Date();
        time.innerText = "Last checked: " + now.toLocaleTimeString();

    }, 2000);
}
</script>

</body>
</html>
